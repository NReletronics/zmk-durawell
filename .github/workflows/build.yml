name: Build ZMK Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Initialize workspace
        run: |
          west init -l config
          west update
      
      - name: Build firmware
        run: |
          west build -p always -b nice_nano -- -DZMK_CONFIG=$GITHUB_WORKSPACE/config
      
      - name: Upload firmware
        uses: actions/upload-artifact@v3
        with:
          name: firmware
          path: build/zephyr/zmk.uf2
