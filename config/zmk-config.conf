# ============================================
# CONFIGURAÇÃO DURAWELL DW-550
# Matriz 10x8 (Rows: 01-10, Cols: 19-26)
# ============================================

# Nome do teclado
CONFIG_ZMK_KEYBOARD_NAME="Durawell_DW550"

# Hardware
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y
CONFIG_BT=y
CONFIG_USB_DEVICE_STACK=y

# Dongle 2.4GHz
CONFIG_ZMK_DONGLE=y
CONFIG_ZMK_DONGLE_TRANSMITTER=y
CONFIG_ZMK_DONGLE_BLE_BRIDGING=y

# Matriz de teclas
CONFIG_ZMK_KSCAN_GPIO_MATRIX=y
CONFIG_ZMK_MATRIX_ROWS=10
CONFIG_ZMK_MATRIX_COLS=8

# Economia de energia
CONFIG_ZMK_SLEEP=y
CONFIG_PM=y
CONFIG_ZMK_SLEEP_TIMEOUT_SECONDS=300

# Indicadores LED (Caps Lock, etc)
CONFIG_ZMK_HID_INDICATORS=y

# Comportamentos adicionais
CONFIG_ZMK_BEHAVIORS=y
CONFIG_ZMK_BEHAVIOR_HOLD=y
CONFIG_ZMK_BEHAVIOR_MOD_MORPH=y
CONFIG_ZMK_BEHAVIOR_LAYER_SWITCH=y

# Display (se houver - desativado para economizar)
CONFIG_ZMK_DISPLAY=n

# Logging (opcional - ative para debug)
# CONFIG_ZMK_LOG_LEVEL_DBG=y
